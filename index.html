<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hemesh Profile</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  background: #e9e9e9;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* PHONE FRAME */
.phone {
  width: 360px;
  background: #fff;
  border-radius: 30px;
  padding: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

/* PROFILE IMAGE */
.profile-img {
  width: 100%;
  border-radius: 25px;
  margin-bottom: 15px;
}

/* NAME */
.name {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 5px;
}

/* BIO */
.bio {
  font-size: 14px;
  color: #666;
  margin-bottom: 15px;
}

/* STATS */
.stats {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
}

.stats span {
  font-weight: bold;
}

/* BUTTON */
.follow-btn {
  width: 100%;
  padding: 12px;
  border-radius: 25px;
  border: none;
  background: #ddd;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 20px;
}

/* WORK GRID */
.work {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.work img {
  width: 100%;
  border-radius: 10px;
}

/* MOBILE */
@media(max-width:400px){
  .phone {
    width: 95%;
  }
}
</style>
</head>

<body>

<div class="phone">

  <!-- PROFILE IMAGE -->
  <img class="profile-img" src="https://static.wikitide.net/deathbattlewiki/9/98/Portrait.tanjirokamado.png">

  <!-- NAME -->
  <div class="name">Hemesh ✔</div>

  <!-- BIO -->
  <div class="bio">
    MCA Student | Tech Enthusiast <br>
    Building cool web projects 🚀
  </div>

  <!-- STATS -->
  <div class="stats">
    <div><span>600</span> Followers</div>
    <div><span>100</span> Posts</div>
  </div>

  <!-- FOLLOW BUTTON -->
  <button class="follow-btn">+ Follow</button>

  <!-- WORK -->
  <h4 style="margin-bottom:10px;">My Work</h4>

  <div class="work">
    <img src="https://picsum.photos/200?1">
    <img src="https://picsum.photos/200?2">
    <img src="https://picsum.photos/200?3">
    <img src="https://picsum.photos/200?4">
    <img src="https://picsum.photos/200?5">
    <img src="https://picsum.photos/200?6">
  </div>

</div>

</body>
</html>
