<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  background: #000;
  color: #fff;
}

/* MAIN */
.container {
  display: flex;
  min-height: 100vh;
}

/* LEFT */
.left {
  flex: 1;
  background: radial-gradient(circle at 20% 20%, #0a0f1f, #000);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px;
}

.logo {
  width: 60px;
  margin-bottom: 30px;
}

.left h1 {
  font-size: 42px;
  line-height: 1.3;
  font-weight: 400;
}

.gradient-text {
  background: linear-gradient(90deg, #ff7a18, #ff0069, #d300c5);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* CARDS */
.cards {
  position: relative;
  margin-top: 50px;
  height: 300px;
}

.card {
  position: absolute;
  width: 180px;
  height: 240px;
  object-fit: cover;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

.card1 { left: 0; top: 40px; transform: rotate(-10deg); }
.card2 { left: 100px; top: 0; z-index: 2; }
.card3 { left: 200px; top: 40px; transform: rotate(10deg); }

/* RIGHT */
.right {
  flex: 1;
  background: #121212;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  width: 100%;
  max-width: 360px;
  padding: 20px;
}

.login-box h2 {
  margin-bottom: 20px;
}

/* INPUT */
.input {
  width: 100%;
  padding: 14px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: 1px solid #333;
  background: #1e1e1e;
  color: #fff;
}

.login-btn {
  width: 100%;
  padding: 14px;
  border-radius: 25px;
  border: none;
  background: #1877f2;
  color: #fff;
  cursor: pointer;
}

.forgot {
  text-align: center;
  margin: 15px 0;
  color: #aaa;
}

.fb-btn, .signup-btn {
  width: 100%;
  padding: 14px;
  border-radius: 25px;
  margin-bottom: 10px;
  cursor: pointer;
}

.fb-btn {
  border: 1px solid #444;
  background: transparent;
  color: #fff;
}

.signup-btn {
  border: 1px solid #1877f2;
  color: #1877f2;
  background: transparent;
}

.meta {
  text-align: center;
  margin-top: 15px;
  color: #777;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 15px;
  font-size: 12px;
  color: #aaa;
  border-top: 1px solid #222;
}

/* ===================== */
/* 📱 MOBILE RESPONSIVE */
/* ===================== */

@media (max-width: 900px) {

  .container {
    flex-direction: column;
  }

  /* Hide left section */
  .left {
    display: none;
  }

  .right {
    flex: none;
    height: 100vh;
  }

  .login-box {
    max-width: 90%;
  }
}

/* ===================== */
/* 📲 TABLET */
/* ===================== */

@media (max-width: 1200px) {

  .left h1 {
    font-size: 32px;
  }

  .card {
    width: 140px;
    height: 200px;
  }

  .card2 { left: 80px; }
  .card3 { left: 160px; }
}

</style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" class="logo">

    <h1>
      See everyday moments from <br>
      your <span class="gradient-text">close friends.</span>
    </h1>

    <div class="cards">
      <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e" class="card card1">
      <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e" class="card card2">
      <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2" class="card card3">
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="login-box">
      <h2>Log into Instagram</h2>

      <input class="input" type="text" placeholder="Mobile number, username or email">
      <input class="input" type="password" placeholder="Password">

      <button class="login-btn">Log in</button>

      <div class="forgot">Forgot password?</div>

      <button class="fb-btn">Log in with Facebook</button>
      <button class="signup-btn">Create new account</button>

      <div class="meta">Meta</div>
    </div>
  </div>

</div>

<div class="footer">
  English © 2026 Instagram from Meta
</div>

</body>
</html>
