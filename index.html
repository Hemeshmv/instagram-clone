<title>Hemesh Profile</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  background: #e9e9e9;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* MAIN CONTAINER */
.phone {
  width: 100%;
  max-width: 420px;
  background: #fff;
  border-radius: 30px;
  padding: 20px;
  box-shadow: 0 25px 50px rgba(0,0,0,0.2);
}

/* PROFILE IMAGE */
.profile-img {
  width: 100%;
  border-radius: 25px;
  margin-bottom: 15px;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 8px;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

/* VERIFIED ICON */
.verify {
  width: 18px;
}

/* BIO */
.bio {
  font-size: 14px;
  color: #666;
  margin: 10px 0 15px;
}

/* STATS */
.stats {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
}

.stats span {
  font-weight: bold;
}

/* FOLLOW BUTTON */
.follow-btn {
  width: 100%;
  padding: 12px;
  border-radius: 25px;
  border: none;
  background: #ddd;
  font-weight: bold;
  margin-bottom: 20px;
  cursor: pointer;
}

/* SECTION */
.section-title {
  font-weight: bold;
  margin-bottom: 10px;
}

/* SOCIAL LINKS */
.socials {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.social {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px;
  border-radius: 12px;
  background: #f3f3f3;
  text-decoration: none;
  color: #000;
  transition: 0.3s;
}

.social:hover {
  background: #e0e0e0;
  transform: scale(1.02);
}

/* LEFT PART */
.left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.icon {
  width: 24px;
  height: 24px;
}

/* BRAND COLORS */
.instagram { border-left: 5px solid #e1306c; }
.whatsapp { border-left: 5px solid #25D366; }
.facebook { border-left: 5px solid #1877f2; }
.twitter { border-left: 5px solid #000; }
.telegram { border-left: 5px solid #0088cc; }
.discord { border-left: 5px solid #5865F2; }

/* RESPONSIVE */
@media (max-width: 500px) {
  body {
    align-items: flex-start;
    padding: 20px 10px;
  }

  .phone {
    border-radius: 20px;
    padding: 15px;
  }

  .name {
    font-size: 18px;
  }

  .bio {
    font-size: 13px;
  }
}
</style>
